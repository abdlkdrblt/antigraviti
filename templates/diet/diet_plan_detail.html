<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ diet_plan.patient_name }} - Diyet Planı</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #f0fdf4;
            --card-bg: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--primary-dark);
        }

        p {
            color: #6b7280;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: #4b5563;
        }

        .btn-secondary:hover {
            background-color: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🥗</div>
        <h1>Diyet Planı Hazır!</h1>
        <p><b>{{ diet_plan.patient_name }}</b> için hazırlanan özel beslenme programı başarıyla oluşturuldu.</p>
        
        <div class="button-group">
            <a href="{% url 'export_pdf' diet_plan.pk %}" class="btn btn-primary" target="_blank">
                📄 PDF Raporu Olarak İndir
            </a>
            <a href="/admin/diet/dietplan/{{ diet_plan.pk }}/change/" class="btn btn-secondary">
                ⚙️ Admin Paneline Dön
            </a>
        </div>
        
        <div style="margin-top: 30px; font-size: 14px; color: #9ca3af;">
            Karakter Testi: ç, ğ, ı, İ, ö, ş, ü
        </div>
    </div>
</body>
</html>
