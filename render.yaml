services:
  - type: web
    name: dietitian-app
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: dietitian-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: dietitian-db
    plan: free
